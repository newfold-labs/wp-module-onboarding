name: "Lint Checker: Onboarding SPA"
on:
  workflow_dispatch:
  push:
    paths:
      - "src/**/*.js"
      - "src/**/*.scss"
  pull_request:
    types: [opened, edited, reopened, ready_for_review]
    paths:
      - "src/**/*.js"
      - "src/**/*.scss"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  lint-check-spa:
    name: Run Lint Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Install Node and npm
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # Checks if node_modules exists in the cache.
      - name: Cache node_modules directory
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      # Install dependencies from package-lock if not in cache.
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        if: steps.cache.outputs.cache-hit != 'true'

      # Gets the files changed wrt to main and filters out the js files.
      - uses: technote-space/get-diff-action@f27caffdd0fb9b13f4fc191c016bb4e0632844af # v6.1.2
        with:
          PATTERNS: |
            +(src)/**/*.js

      # Runs wp-scripts for checking JS coding issues.
      - name: Run JS Lint
        id: js-lint
        run: npx wp-scripts lint-js ${{ env.GIT_DIFF }}
        if: "!! env.GIT_DIFF"

      # Gets the files changed wrt to main and filters out the SASS files.
      - uses: technote-space/get-diff-action@f27caffdd0fb9b13f4fc191c016bb4e0632844af # v6.1.2
        with:
          PATTERNS: |
            +(src)/**/*.scss
        if: ${{ success() || steps.js-lint.conclusion == 'failure' }}

      # Runs wp-scripts for checking SASS coding issues.
      - name: Run SASS Lint
        id: sass-lint
        run: npx wp-scripts lint-style ${{ env.GIT_DIFF }}
        if: ${{ (!! env.GIT_DIFF) && (success() || steps.js-lint.conclusion == 'failure') }}
